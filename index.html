<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servet Imparatorlugu v0.4</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #080d16; color: #f8fafc; font-family: Arial, sans-serif; }
    .app { max-width: 540px; margin: 0 auto; padding: 14px; }
    .card { background: #121826; border: 1px solid #293449; border-radius: 18px; padding: 14px; margin-bottom: 12px; }
    h1 { margin: 0 0 6px; font-size: 25px; }
    h2 { margin: 0 0 10px; font-size: 20px; }
    h3 { margin: 12px 0 6px; font-size: 17px; }
    p { margin: 7px 0; }
    .muted { color: #9ca3af; font-size: 14px; }
    .status { color: #22c55e; font-weight: bold; }
    .error { color: #f87171; font-weight: bold; }
    input, select, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 13px; border: 1px solid #334155; font-size: 16px; }
    input, select, textarea { background: #0b1020; color: #ffffff; }
    button { background: #2563eb; color: #ffffff; font-weight: bold; cursor: pointer; }
    button:active { transform: scale(0.99); }
    .secondary { background: #374151; }
    .danger { background: #991b1b; }
    .sell { background: #15803d; }
    .warn { background: #b45309; }
    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .tabbtn { background: #1f2937; padding: 10px 5px; font-size: 14px; }
    .tabbtn.active { background: #2563eb; }
    .tab { display: none; }
    .tab.active { display: block; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .stat { background: #0b1020; border: 1px solid #26324a; border-radius: 14px; padding: 11px; min-height: 72px; }
    .stat b { font-size: 18px; display: block; margin-top: 4px; }
    .item { background: #0b1020; border: 1px solid #26324a; border-radius: 14px; padding: 11px; margin-top: 9px; }
    .item-title { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .item-title b { font-size: 16px; }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 8px; }
    .actions button { padding: 9px 5px; font-size: 13px; margin-top: 0; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .log { max-height: 260px; overflow: auto; }
    .log p { border-bottom: 1px solid #26324a; padding-bottom: 6px; font-size: 14px; color: #cbd5e1; }
  </style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>Servet Imparatorlugu</h1>
    <p class="muted">v0.4 - Sat/Sil, duzenleme, ayarlar</p>
    <p id="status" class="status">Motor yukleniyor...</p>
  </div>

  <div class="card">
    <h2>Profil Secimi</h2>
    <select id="profileSelect"></select>
    <div class="two">
      <input id="profileName" type="text" placeholder="Profil adi">
      <input id="profileAge" type="number" placeholder="Yas">
    </div>
    <input id="profileJob" type="text" placeholder="Maasli meslek">
    <div class="two">
      <input id="profileCash" type="number" placeholder="Baslangic nakit">
      <input id="profileSalary" type="number" placeholder="Haftalik maas">
    </div>
    <input id="profileExpense" type="number" placeholder="Haftalik gider">
    <button id="addProfileBtn" type="button">+ Profil Olustur</button>
  </div>

  <div class="tabs">
    <button class="tabbtn active" type="button" data-tab="panel">Panel</button>
    <button class="tabbtn" type="button" data-tab="profileTab">Profil</button>
    <button class="tabbtn" type="button" data-tab="assets">Varlik</button>
    <button class="tabbtn" type="button" data-tab="companies">Sirket</button>
    <button class="tabbtn" type="button" data-tab="investments">Yatirim</button>
    <button class="tabbtn" type="button" data-tab="ranking">Siralama</button>
    <button class="tabbtn" type="button" data-tab="logs">Hareket</button>
    <button class="tabbtn" type="button" data-tab="settings">Ayarlar</button>
    <button id="nextWeekBtn" type="button">+ Hafta</button>
  </div>

  <div id="panel" class="tab active card">
    <h2>Ana Panel</h2>
    <div class="grid">
      <div class="stat">Aktif Profil<b id="activeProfile">Yok</b></div>
      <div class="stat">Toplam Servet<b id="wealthView">0</b></div>
      <div class="stat">Nakit<b id="cashView">0</b></div>
      <div class="stat">Hafta<b id="weekView">1</b></div>
      <div class="stat">Meslek<b id="jobView">Yok</b></div>
      <div class="stat">Yas<b id="ageView">0</b></div>
    </div>
    <h3>Son Hareketler</h3>
    <div id="lastLogs" class="log"></div>
  </div>

  <div id="profileTab" class="tab card">
    <h2>Profil Duzenle</h2>
    <input id="editName" type="text" placeholder="Ad">
    <input id="editAge" type="number" placeholder="Yas">
    <input id="editJob" type="text" placeholder="Meslek">
    <input id="editCash" type="number" placeholder="Nakit">
    <input id="editSalary" type="number" placeholder="Haftalik maas">
    <input id="editExpense" type="number" placeholder="Haftalik gider">
    <button id="saveProfileBtn" type="button">Profili Kaydet</button>
    <button id="deleteProfileBtn" type="button" class="danger">Aktif Profili Sil</button>
  </div>

  <div id="assets" class="tab card">
    <h2>Varliklar</h2>
    <select id="assetType">
      <option>Araba</option><option>Ev</option><option>Arsa</option><option>Depo</option><option>Fabrika</option><option>Diger</option>
    </select>
    <input id="assetName" type="text" placeholder="Varlik adi">
    <input id="assetValue" type="number" placeholder="Guncel deger">
    <input id="assetIncome" type="number" placeholder="Haftalik gelir">
    <input id="assetExpense" type="number" placeholder="Haftalik gider">
    <button id="addAssetBtn" type="button">Varlik Ekle</button>
    <div id="assetList"></div>
  </div>

  <div id="companies" class="tab card">
    <h2>Sirketler</h2>
    <select id="companySector">
      <option>Sanayi</option><option>Mermer</option><option>Insaat</option><option>Turizm</option><option>Lojistik</option><option>Teknoloji</option><option>Diger</option>
    </select>
    <input id="companyName" type="text" placeholder="Sirket adi">
    <input id="companyValue" type="number" placeholder="Sirket degeri">
    <input id="companyShare" type="number" placeholder="Hisse orani %" value="100">
    <input id="companyIncome" type="number" placeholder="Haftalik gelir">
    <input id="companyExpense" type="number" placeholder="Haftalik gider">
    <button id="addCompanyBtn" type="button">Sirket Ekle</button>
    <div id="companyList"></div>
  </div>

  <div id="investments" class="tab card">
    <h2>Yatirimlar</h2>
    <select id="investmentType">
      <option>Kripto</option><option>Hisse</option><option>Fon</option><option>Altin</option><option>Doviz</option><option>Diger</option>
    </select>
    <input id="investmentName" type="text" placeholder="Yatirim adi">
    <input id="investmentValue" type="number" placeholder="Guncel deger">
    <button id="addInvestmentBtn" type="button">Yatirim Ekle</button>
    <div id="investmentList"></div>
  </div>

  <div id="ranking" class="tab card">
    <h2>Servet Siralamasi</h2>
    <div id="rankingList"></div>
  </div>

  <div id="logs" class="tab card">
    <h2>Hareket Gecmisi</h2>
    <div id="logList" class="log"></div>
  </div>

  <div id="settings" class="tab card">
    <h2>Ayarlar</h2>
    <label class="muted">Para birimi</label>
    <select id="currencySelect">
      <option value="EUR">EUR</option><option value="USD">USD</option><option value="TRY">TRY</option>
    </select>
    <button id="saveSettingsBtn" type="button">Ayarlari Kaydet</button>
    <button id="exportBtn" type="button" class="secondary">Veriyi Disa Aktar</button>
    <textarea id="dataBox" rows="6" placeholder="Veri burada gorunur veya buraya yapistirilir"></textarea>
    <button id="importBtn" type="button" class="secondary">Veriyi Ice Aktar</button>
    <button id="clearLogsBtn" type="button" class="warn">Hareketleri Temizle</button>
    <button id="resetBtn" type="button" class="danger">Tum Verileri Sifirla</button>
  </div>
</div>

<script>
window.onerror = function(message, source, line) {
  var st = document.getElementById("status");
  if (st) { st.className = "error"; st.textContent = "JS HATASI: " + message + " / line " + line; }
};

var STORE_KEY = "servet_game_v04";
var game = { version: "0.4", week: 1, currency: "EUR", activeProfileId: null, profiles: [], logs: [] };

function uid() { return String(Date.now()) + String(Math.floor(Math.random() * 1000)); }
function sym() { if (game.currency === "USD") return "$"; if (game.currency === "TRY") return "TL"; return "EUR"; }
function money(n) { return Number(n || 0).toLocaleString("tr-TR") + " " + sym(); }
function clampShare(n) { n = Number(n || 0); if (n < 0) return 0; if (n > 100) return 100; return n; }
function addLog(text) { game.logs.unshift("Hafta " + game.week + ": " + text); if (game.logs.length > 80) game.logs.pop(); }
function saveGame() { localStorage.setItem(STORE_KEY, JSON.stringify(game)); }
function loadGame() { var data = localStorage.getItem(STORE_KEY); if (data) { game = JSON.parse(data); } migrate(); }
function migrate() {
  if (!game.logs) game.logs = [];
  if (!game.currency) game.currency = "EUR";
  for (var i = 0; i < game.profiles.length; i++) {
    var p = game.profiles[i];
    if (!p.assets) p.assets = [];
    if (!p.companies) p.companies = [];
    if (!p.investments) p.investments = [];
    if (p.age === undefined) p.age = 0;
    if (p.job === undefined) p.job = "";
    if (p.weeklySalary === undefined) p.weeklySalary = 0;
    if (p.weeklyExpense === undefined) p.weeklyExpense = 0;
  }
}
function getActiveProfile() { for (var i = 0; i < game.profiles.length; i++) { if (game.profiles[i].id === game.activeProfileId) return game.profiles[i]; } return null; }
function profileWealth(p) {
  var total = Number(p.cash || 0);
  var i;
  for (i = 0; i < p.assets.length; i++) total += Number(p.assets[i].value || 0);
  for (i = 0; i < p.investments.length; i++) total += Number(p.investments[i].value || 0);
  for (i = 0; i < p.companies.length; i++) total += Number(p.companies[i].value || 0) * clampShare(p.companies[i].share) / 100;
  return Math.round(total);
}
function requireProfile() { var p = getActiveProfile(); if (!p) alert("Once profil olustur."); return p; }

function addProfile() {
  var name = document.getElementById("profileName").value.trim();
  if (!name) { alert("Profil adi yaz."); return; }
  var p = { id: uid(), name: name, age: Number(document.getElementById("profileAge").value || 0), job: document.getElementById("profileJob").value.trim(), cash: Number(document.getElementById("profileCash").value || 0), weeklySalary: Number(document.getElementById("profileSalary").value || 0), weeklyExpense: Number(document.getElementById("profileExpense").value || 0), assets: [], companies: [], investments: [] };
  game.profiles.push(p); game.activeProfileId = p.id; addLog("Profil olusturuldu: " + p.name);
  document.getElementById("profileName").value = ""; document.getElementById("profileAge").value = ""; document.getElementById("profileJob").value = ""; document.getElementById("profileCash").value = ""; document.getElementById("profileSalary").value = ""; document.getElementById("profileExpense").value = "";
  saveGame(); render(); alert("Profil olusturuldu.");
}
function selectProfile() { game.activeProfileId = document.getElementById("profileSelect").value; saveGame(); render(); }
function saveProfileEdit() {
  var p = requireProfile(); if (!p) return;
  p.name = document.getElementById("editName").value.trim() || p.name;
  p.age = Number(document.getElementById("editAge").value || 0);
  p.job = document.getElementById("editJob").value.trim();
  p.cash = Number(document.getElementById("editCash").value || 0);
  p.weeklySalary = Number(document.getElementById("editSalary").value || 0);
  p.weeklyExpense = Number(document.getElementById("editExpense").value || 0);
  addLog("Profil duzenlendi: " + p.name); saveGame(); render(); alert("Profil kaydedildi.");
}
function deleteActiveProfile() {
  var p = requireProfile(); if (!p) return;
  if (!confirm(p.name + " profili silinsin mi?")) return;
  game.profiles = game.profiles.filter(function(x) { return x.id !== p.id; });
  game.activeProfileId = game.profiles.length ? game.profiles[0].id : null;
  addLog("Profil silindi: " + p.name); saveGame(); render();
}

function addAsset() { var p = requireProfile(); if (!p) return; var name = document.getElementById("assetName").value.trim(); if (!name) { alert("Varlik adi yaz."); return; } var a = { id: uid(), type: document.getElementById("assetType").value, name: name, value: Number(document.getElementById("assetValue").value || 0), income: Number(document.getElementById("assetIncome").value || 0), expense: Number(document.getElementById("assetExpense").value || 0) }; p.assets.push(a); addLog("Varlik eklendi: " + a.name); clearAssetForm(); saveGame(); render(); }
function clearAssetForm() { document.getElementById("assetName").value = ""; document.getElementById("assetValue").value = ""; document.getElementById("assetIncome").value = ""; document.getElementById("assetExpense").value = ""; }
function sellAsset(id) { var p = requireProfile(); if (!p) return; var a = p.assets.find(function(x){ return x.id === id; }); if (!a) return; if (!confirm(a.name + " satilsin mi?")) return; p.cash += Number(a.value || 0); p.assets = p.assets.filter(function(x){ return x.id !== id; }); addLog("Varlik satildi: " + a.name + " +" + money(a.value)); saveGame(); render(); }
function deleteAsset(id) { var p = requireProfile(); if (!p) return; var a = p.assets.find(function(x){ return x.id === id; }); if (!a) return; if (!confirm(a.name + " silinsin mi? Para eklenmez.")) return; p.assets = p.assets.filter(function(x){ return x.id !== id; }); addLog("Varlik silindi: " + a.name); saveGame(); render(); }
function editAsset(id) { var p = requireProfile(); if (!p) return; var a = p.assets.find(function(x){ return x.id === id; }); if (!a) return; var name = prompt("Yeni ad", a.name); if (name === null) return; var value = prompt("Yeni deger", a.value); if (value === null) return; a.name = name.trim() || a.name; a.value = Number(value || 0); addLog("Varlik duzenlendi: " + a.name); saveGame(); render(); }

function addCompany() { var p = requireProfile(); if (!p) return; var name = document.getElementById("companyName").value.trim(); if (!name) { alert("Sirket adi yaz."); return; } var c = { id: uid(), sector: document.getElementById("companySector").value, name: name, value: Number(document.getElementById("companyValue").value || 0), share: clampShare(document.getElementById("companyShare").value || 100), income: Number(document.getElementById("companyIncome").value || 0), expense: Number(document.getElementById("companyExpense").value || 0) }; p.companies.push(c); addLog("Sirket eklendi: " + c.name); clearCompanyForm(); saveGame(); render(); }
function clearCompanyForm() { document.getElementById("companyName").value = ""; document.getElementById("companyValue").value = ""; document.getElementById("companyShare").value = "100"; document.getElementById("companyIncome").value = ""; document.getElementById("companyExpense").value = ""; }
function sellCompany(id) { var p = requireProfile(); if (!p) return; var c = p.companies.find(function(x){ return x.id === id; }); if (!c) return; if (!confirm(c.name + " satilsin mi?")) return; var sale = Math.round(Number(c.value || 0) * clampShare(c.share) / 100); p.cash += sale; p.companies = p.companies.filter(function(x){ return x.id !== id; }); addLog("Sirket satildi: " + c.name + " +" + money(sale)); saveGame(); render(); }
function deleteCompany(id) { var p = requireProfile(); if (!p) return; var c = p.companies.find(function(x){ return x.id === id; }); if (!c) return; if (!confirm(c.name + " silinsin mi? Para eklenmez.")) return; p.companies = p.companies.filter(function(x){ return x.id !== id; }); addLog("Sirket silindi: " + c.name); saveGame(); render(); }
function editCompany(id) { var p = requireProfile(); if (!p) return; var c = p.companies.find(function(x){ return x.id === id; }); if (!c) return; var name = prompt("Yeni ad", c.name); if (name === null) return; var value = prompt("Yeni deger", c.value); if (value === null) return; var share = prompt("Hisse orani %", c.share); if (share === null) return; c.name = name.trim() || c.name; c.value = Number(value || 0); c.share = clampShare(share); addLog("Sirket duzenlendi: " + c.name); saveGame(); render(); }

function addInvestment() { var p = requireProfile(); if (!p) return; var name = document.getElementById("investmentName").value.trim(); if (!name) { alert("Yatirim adi yaz."); return; } var inv = { id: uid(), type: document.getElementById("investmentType").value, name: name, value: Number(document.getElementById("investmentValue").value || 0) }; p.investments.push(inv); addLog("Yatirim eklendi: " + inv.name); document.getElementById("investmentName").value = ""; document.getElementById("investmentValue").value = ""; saveGame(); render(); }
function sellInvestment(id) { var p = requireProfile(); if (!p) return; var inv = p.investments.find(function(x){ return x.id === id; }); if (!inv) return; if (!confirm(inv.name + " satilsin mi?")) return; p.cash += Number(inv.value || 0); p.investments = p.investments.filter(function(x){ return x.id !== id; }); addLog("Yatirim satildi: " + inv.name + " +" + money(inv.value)); saveGame(); render(); }
function deleteInvestment(id) { var p = requireProfile(); if (!p) return; var inv = p.investments.find(function(x){ return x.id === id; }); if (!inv) return; if (!confirm(inv.name + " silinsin mi? Para eklenmez.")) return; p.investments = p.investments.filter(function(x){ return x.id !== id; }); addLog("Yatirim silindi: " + inv.name); saveGame(); render(); }
function editInvestment(id) { var p = requireProfile(); if (!p) return; var inv = p.investments.find(function(x){ return x.id === id; }); if (!inv) return; var name = prompt("Yeni ad", inv.name); if (name === null) return; var value = prompt("Yeni deger", inv.value); if (value === null) return; inv.name = name.trim() || inv.name; inv.value = Number(value || 0); addLog("Yatirim duzenlendi: " + inv.name); saveGame(); render(); }

function nextWeek() {
  game.week += 1;
  for (var i = 0; i < game.profiles.length; i++) {
    var p = game.profiles[i];
    var net = Number(p.weeklySalary || 0) - Number(p.weeklyExpense || 0);
    p.cash += net;
    for (var a = 0; a < p.assets.length; a++) {
      p.cash += Number(p.assets[a].income || 0) - Number(p.assets[a].expense || 0);
      p.assets[a].value = Math.max(0, Math.round(Number(p.assets[a].value || 0) * (1 + ((Math.random() * 2 - 0.5) / 100))));
    }
    for (var c = 0; c < p.companies.length; c++) {
      var profit = Number(p.companies[c].income || 0) - Number(p.companies[c].expense || 0);
      p.cash += Math.round(profit * clampShare(p.companies[c].share) / 100);
      p.companies[c].value = Math.max(0, Math.round(Number(p.companies[c].value || 0) * (1 + ((Math.random() * 6 - 2) / 100))));
    }
    for (var n = 0; n < p.investments.length; n++) {
      p.investments[n].value = Math.max(0, Math.round(Number(p.investments[n].value || 0) * (1 + ((Math.random() * 10 - 4) / 100))));
    }
  }
  addLog("Hafta ilerledi. Ekonomi motoru calisti."); saveGame(); render(); alert("Hafta ilerledi.");
}

function render() {
  renderProfileSelect(); renderPanel(); renderProfileEdit(); renderAssets(); renderCompanies(); renderInvestments(); renderRanking(); renderLogs(); document.getElementById("currencySelect").value = game.currency; saveGame();
}
function renderProfileSelect() { var select = document.getElementById("profileSelect"); select.innerHTML = ""; if (game.profiles.length === 0) { var o = document.createElement("option"); o.value = ""; o.textContent = "Profil yok"; select.appendChild(o); return; } for (var i = 0; i < game.profiles.length; i++) { var p = game.profiles[i]; var opt = document.createElement("option"); opt.value = p.id; opt.textContent = p.name; if (p.id === game.activeProfileId) opt.selected = true; select.appendChild(opt); } }
function renderPanel() { var p = getActiveProfile(); document.getElementById("activeProfile").textContent = p ? p.name : "Yok"; document.getElementById("wealthView").textContent = p ? money(profileWealth(p)) : money(0); document.getElementById("cashView").textContent = p ? money(p.cash) : money(0); document.getElementById("weekView").textContent = String(game.week); document.getElementById("jobView").textContent = p && p.job ? p.job : "Yok"; document.getElementById("ageView").textContent = p ? String(p.age || 0) : "0"; var html = ""; for (var i = 0; i < Math.min(game.logs.length, 6); i++) html += "<p>" + game.logs[i] + "</p>"; document.getElementById("lastLogs").innerHTML = html || "<p class='muted'>Hareket yok.</p>"; }
function renderProfileEdit() { var p = getActiveProfile(); if (!p) return; document.getElementById("editName").value = p.name || ""; document.getElementById("editAge").value = p.age || ""; document.getElementById("editJob").value = p.job || ""; document.getElementById("editCash").value = p.cash || 0; document.getElementById("editSalary").value = p.weeklySalary || 0; document.getElementById("editExpense").value = p.weeklyExpense || 0; }
function renderAssets() { var box = document.getElementById("assetList"); var p = getActiveProfile(); if (!p || p.assets.length === 0) { box.innerHTML = "<p class='muted'>Varlik yok.</p>"; return; } var html = ""; for (var i = 0; i < p.assets.length; i++) { var a = p.assets[i]; html += "<div class='item'><div class='item-title'><b>" + a.name + "</b><span>" + money(a.value) + "</span></div><p class='muted'>" + a.type + " | Haftalik: " + money(Number(a.income||0)-Number(a.expense||0)) + "</p><div class='actions'><button class='secondary' onclick='editAsset(\"" + a.id + "\")'>Duzenle</button><button class='sell' onclick='sellAsset(\"" + a.id + "\")'>Sat</button><button class='danger' onclick='deleteAsset(\"" + a.id + "\")'>Sil</button></div></div>"; } box.innerHTML = html; }
function renderCompanies() { var box = document.getElementById("companyList"); var p = getActiveProfile(); if (!p || p.companies.length === 0) { box.innerHTML = "<p class='muted'>Sirket yok.</p>"; return; } var html = ""; for (var i = 0; i < p.companies.length; i++) { var c = p.companies[i]; var shareVal = Math.round(Number(c.value||0)*clampShare(c.share)/100); html += "<div class='item'><div class='item-title'><b>" + c.name + "</b><span>" + money(shareVal) + "</span></div><p class='muted'>" + c.sector + " | Hisse %" + c.share + " | Sirket degeri: " + money(c.value) + " | Haftalik kar: " + money(Number(c.income||0)-Number(c.expense||0)) + "</p><div class='actions'><button class='secondary' onclick='editCompany(\"" + c.id + "\")'>Duzenle</button><button class='sell' onclick='sellCompany(\"" + c.id + "\")'>Sat</button><button class='danger' onclick='deleteCompany(\"" + c.id + "\")'>Sil</button></div></div>"; } box.innerHTML = html; }
function renderInvestments() { var box = document.getElementById("investmentList"); var p = getActiveProfile(); if (!p || p.investments.length === 0) { box.innerHTML = "<p class='muted'>Yatirim yok.</p>"; return; } var html = ""; for (var i = 0; i < p.investments.length; i++) { var inv = p.investments[i]; html += "<div class='item'><div class='item-title'><b>" + inv.name + "</b><span>" + money(inv.value) + "</span></div><p class='muted'>" + inv.type + "</p><div class='actions'><button class='secondary' onclick='editInvestment(\"" + inv.id + "\")'>Duzenle</button><button class='sell' onclick='sellInvestment(\"" + inv.id + "\")'>Sat</button><button class='danger' onclick='deleteInvestment(\"" + inv.id + "\")'>Sil</button></div></div>"; } box.innerHTML = html; }
function renderRanking() { var box = document.getElementById("rankingList"); if (game.profiles.length === 0) { box.innerHTML = "<p class='muted'>Siralama yok.</p>"; return; } var arr = game.profiles.slice().sort(function(a,b){ return profileWealth(b)-profileWealth(a); }); var html = ""; for (var i = 0; i < arr.length; i++) html += "<div class='item'><b>" + (i+1) + ". " + arr[i].name + "</b><br>" + money(profileWealth(arr[i])) + "</div>"; box.innerHTML = html; }
function renderLogs() { var box = document.getElementById("logList"); var html = ""; for (var i = 0; i < game.logs.length; i++) html += "<p>" + game.logs[i] + "</p>"; box.innerHTML = html || "<p class='muted'>Hareket yok.</p>"; }

function openTab(tabId) { var tabs = document.getElementsByClassName("tab"); var btns = document.getElementsByClassName("tabbtn"); var i; for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active"); for (i = 0; i < btns.length; i++) btns[i].classList.remove("active"); document.getElementById(tabId).classList.add("active"); for (i = 0; i < btns.length; i++) if (btns[i].getAttribute("data-tab") === tabId) btns[i].classList.add("active"); }
function saveSettings() { game.currency = document.getElementById("currencySelect").value; addLog("Ayarlar kaydedildi."); saveGame(); render(); }
function exportData() { document.getElementById("dataBox").value = JSON.stringify(game); }
function importData() { try { var text = document.getElementById("dataBox").value.trim(); if (!text) { alert("Veri kutusu bos."); return; } game = JSON.parse(text); migrate(); addLog("Veri ice aktarildi."); saveGame(); render(); alert("Veri aktarildi."); } catch(e) { alert("Veri okunamadi."); } }
function clearLogs() { game.logs = []; saveGame(); render(); }
function resetGame() { if (!confirm("Tum veriler silinsin mi?")) return; localStorage.removeItem(STORE_KEY); game = { version: "0.4", week: 1, currency: "EUR", activeProfileId: null, profiles: [], logs: [] }; render(); }
function bind() {
  document.getElementById("addProfileBtn").addEventListener("click", addProfile);
  document.getElementById("profileSelect").addEventListener("change", selectProfile);
  document.getElementById("saveProfileBtn").addEventListener("click", saveProfileEdit);
  document.getElementById("deleteProfileBtn").addEventListener("click", deleteActiveProfile);
  document.getElementById("addAssetBtn").addEventListener("click", addAsset);
  document.getElementById("addCompanyBtn").addEventListener("click", addCompany);
  document.getElementById("addInvestmentBtn").addEventListener("click", addInvestment);
  document.getElementById("nextWeekBtn").addEventListener("click", nextWeek);
  document.getElementById("saveSettingsBtn").addEventListener("click", saveSettings);
  document.getElementById("exportBtn").addEventListener("click", exportData);
  document.getElementById("importBtn").addEventListener("click", importData);
  document.getElementById("clearLogsBtn").addEventListener("click", clearLogs);
  document.getElementById("resetBtn").addEventListener("click", resetGame);
  var btns = document.getElementsByClassName("tabbtn");
  for (var i = 0; i < btns.length; i++) btns[i].addEventListener("click", function(){ openTab(this.getAttribute("data-tab")); });
}
document.addEventListener("DOMContentLoaded", function(){ loadGame(); bind(); document.getElementById("status").textContent = "Motor aktif v0.4"; render(); });
</script>
